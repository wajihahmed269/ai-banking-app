name: DevSecOps Pipeline

on:
  push:
    branches: [main, devsecops]
  pull_request:
    branches: [main]

permissions:
  issues: write
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: devsecops-bankapp
  IMAGE_TAG: ${{ github.sha }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ubuntu

jobs:
  # Gate 1: Secret Scan
  secret-scan:
    name: 🔐 Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Gate 2: Lint
  lint:
    name: 📏 Checkstyle Lint
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Run Checkstyle
        run: |
          ./mvnw checkstyle:check -f pom.xml || true

  # Gate 3: SAST
  sast:
    name: 🛡️ Semgrep SAST
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config=p/java --sarif --output=semgrep.sarif . || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Gate 4: SCA
  sca:
    name: 📦 OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Run OWASP Dependency Check
        run: |
          ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9
        continue-on-error: true

  # Gate 5: Build
  build:
    name: 🔨 Maven Build
    runs-on: ubuntu-latest
    needs: sca
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build JAR
        run: ./mvnw clean package -DskipTests -B

  # Gate 6: Container Scan
  container-scan:
    name: 🐳 Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t bankapp:${{ env.IMAGE_TAG }} .
      - uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: bankapp:${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Gate 7: Push to ECR
  push-ecr:
    name: 📤 Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: container-scan
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, Tag, Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }}
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # Gate 8: Deploy
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: push-ecr
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy via SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'EOF'
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            cd ~/ai-banking-app
            docker compose pull
            docker compose up -d --force-recreate
            docker system prune -f
          EOF
          rm -f private_key.pem

  # Gate 9: DAST
  dast:
    name: 🕷️ OWASP ZAP DAST Scan
    permissions:
      issues: write
      contents: read
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for app to be ready
        run: sleep 30
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://${{ secrets.EC2_HOST }}:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

  push-acr:
    name: 📤 Push to Azure ACR
    runs-on: ubuntu-latest
    needs: container-scan
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: Build and Push to ACR
        run: |
          IMAGE_URI=${{ secrets.AZURE_ACR_NAME }}.azurecr.io/devsecops-bankapp:${{ env.IMAGE_TAG }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

  deploy-azure:
    name: 🚀 Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: push-acr
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy via SSH
        env:
          PRIVATE_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
        run: |
          echo "$PRIVATE_KEY" > azure_key.pem
          chmod 600 azure_key.pem
          ssh -o StrictHostKeyChecking=no -i azure_key.pem ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'ENDSSH'
            SECRET=$(az keyvault secret list --vault-name bankapp-keyvault --query "[].name" -o tsv 2>/dev/null || echo "")

            DB_HOST=$(az keyvault secret show --vault-name bankapp-keyvault --name DB-HOST --query value -o tsv)
            DB_PORT=$(az keyvault secret show --vault-name bankapp-keyvault --name DB-PORT --query value -o tsv)
            DB_NAME=$(az keyvault secret show --vault-name bankapp-keyvault --name DB-NAME --query value -o tsv)
            DB_USER=$(az keyvault secret show --vault-name bankapp-keyvault --name DB-USER --query value -o tsv)
            DB_PASSWORD=$(az keyvault secret show --vault-name bankapp-keyvault --name DB-PASSWORD --query value -o tsv)
            OLLAMA_URL=$(az keyvault secret show --vault-name bankapp-keyvault --name OLLAMA-URL --query value -o tsv)

            IMAGE_URI=wajihbankacr.azurecr.io/devsecops-bankapp:${{ env.IMAGE_TAG }}

            az acr login --name wajihbankacr
            docker pull $IMAGE_URI

            cd ~/ai-banking-app
            IMAGE_URI=$IMAGE_URI \
            DB_HOST=$DB_HOST \
            DB_PORT=$DB_PORT \
            DB_NAME=$DB_NAME \
            DB_USER=$DB_USER \
            DB_PASSWORD=$DB_PASSWORD \
            OLLAMA_URL=$OLLAMA_URL \
            docker compose up -d --force-recreate
          ENDSSH
          rm -f azure_key.pem
