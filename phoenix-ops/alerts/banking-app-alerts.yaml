apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: banking-app-alerts
  namespace: default
  labels:
    app: banking-app
    release: monitoring
spec:
  groups:
  - name: banking-app.rules
    rules:
    - alert: BankingAppDown
      expr: |
        kube_deployment_status_replicas_available{namespace="default", deployment="banking-app"} < 1
        or absent(kube_deployment_status_replicas_available{namespace="default", deployment="banking-app"})
      for: 2m
      labels:
        severity: critical
        app: banking-app
      annotations:
        summary: Banking app deployment has no available replicas
        description: The banking-app deployment in the default namespace has had no available replicas for at least 2 minutes.
    - alert: BankingAppHighRestarts
      expr: |
        sum by (namespace, pod) (
          increase(kube_pod_container_status_restarts_total{namespace="default", container="banking-app", pod=~"banking-app-.*"}[10m])
          * on (namespace, pod) group_left(label_app)
          kube_pod_labels{namespace="default", label_app="banking-app"}
        ) > 3
      for: 5m
      labels:
        severity: warning
        app: banking-app
      annotations:
        summary: Banking app pod restart count is high
        description: A banking-app pod in the default namespace has restarted more than 3 times in the last 10 minutes.
