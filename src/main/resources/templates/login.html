<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking App - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card-title { color: #00d4ff; }
        label { color: #ccc; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4 shadow">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">💳 WajihBank</h3>
                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" id="username" class="form-control bg-dark text-white border-secondary" placeholder="Enter username">
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control bg-dark text-white border-secondary" placeholder="Enter password">
                    </div>
                    <button onclick="login()" class="btn btn-info w-100">Login</button>
                    <hr class="border-secondary">
                    <button onclick="register()" class="btn btn-outline-secondary w-100">Create Account</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        }).then(r => r.json()).then(data => {
            if (data.success) {
                localStorage.setItem('username', username);
                window.location.href = '/dashboard';
            } else {
                showError(data.message || 'Invalid credentials');
            }
        }).catch(() => showError('Something went wrong'));
    }

    function register() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        }).then(r => r.json()).then(data => {
            if (data.success) {
                localStorage.setItem('username', username);
                window.location.href = '/dashboard';
            } else {
                showError(data.message || 'Registration failed');
            }
        }).catch(() => showError('Something went wrong'));
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
    }
</script>
</body>
</html>
