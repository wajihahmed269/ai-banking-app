<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - WajihBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: white; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .navbar { background: rgba(0,0,0,0.3) !important; }
        table { color: white; }
        .badge-deposit { background: #198754; }
        .badge-withdrawal { background: #dc3545; }
        .form-control, .form-select { background: #1a1a2e !important; color: white !important; border-color: #444 !important; }
        .form-select option { background: #1a1a2e; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">💳 WajihBank</span>
    <div class="d-flex gap-3">
        <a href="/dashboard" class="btn btn-outline-info btn-sm">Dashboard</a>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
</nav>
<div class="container mt-5">
    <div class="glass p-4 mb-3">
        <h6 class="text-info mb-3">🔍 Filter Transactions</h6>
        <div class="row g-2">
            <div class="col-md-3">
                <select id="filterType" class="form-select form-select-sm">
                    <option value="ALL">All Types</option>
                    <option value="DEPOSIT">Deposit Only</option>
                    <option value="WITHDRAWAL">Withdrawal Only</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="date" id="filterFrom" class="form-control form-control-sm" placeholder="From date">
            </div>
            <div class="col-md-3">
                <input type="date" id="filterTo" class="form-control form-control-sm" placeholder="To date">
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button onclick="applyFilters()" class="btn btn-info btn-sm w-100">Apply</button>
                <button onclick="resetFilters()" class="btn btn-outline-secondary btn-sm w-100">Reset</button>
            </div>
        </div>
    </div>
    <div class="glass p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="text-info mb-0">Transaction History</h4>
            <span class="text-secondary small" id="resultCount"></span>
        </div>
        <div class="table-responsive">
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Date & Time</th>
                    </tr>
                </thead>
                <tbody id="txTableBody">
                    <tr><td colspan="4" class="text-center text-secondary">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const username = localStorage.getItem('username');
    if (!username) window.location.href = '/';

    let allTransactions = [];

    fetch(`/api/transactions/${username}`)
        .then(r => r.json())
        .then(transactions => {
            allTransactions = transactions;
            renderTable(allTransactions);
        });

    function applyFilters() {
        const type = document.getElementById('filterType').value;
        const from = document.getElementById('filterFrom').value;
        const to = document.getElementById('filterTo').value;

        let filtered = allTransactions.filter(tx => {
            const matchType = type === 'ALL' || tx.type === type;
            const txDate = new Date(tx.timestamp);
            const matchFrom = !from || txDate >= new Date(from);
            const matchTo = !to || txDate <= new Date(to + 'T23:59:59');
            return matchType && matchFrom && matchTo;
        });

        renderTable(filtered);
    }

    function resetFilters() {
        document.getElementById('filterType').value = 'ALL';
        document.getElementById('filterFrom').value = '';
        document.getElementById('filterTo').value = '';
        renderTable(allTransactions);
    }

    function renderTable(transactions) {
        const tbody = document.getElementById('txTableBody');
        document.getElementById('resultCount').textContent = `${transactions.length} transaction(s)`;

        if (transactions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-secondary">No transactions found</td></tr>';
            return;
        }
        tbody.innerHTML = transactions.map((tx, i) => `
            <tr>
                <td>${i + 1}</td>
                <td><span class="badge badge-${tx.type.toLowerCase()}">${tx.type}</span></td>
                <td>$${tx.amount.toFixed(2)}</td>
                <td>${new Date(tx.timestamp).toLocaleString()}</td>
            </tr>
        `).join('');
    }

    function logout() {
        localStorage.removeItem('username');
        window.location.href = '/';
    }
</script>
</body>
</html>
